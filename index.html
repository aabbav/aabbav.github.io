    /* ----- RESET SOME DEFAULTS ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      line-height: 1.5;
      color: #333;
      background-color: #f8f9fa;
    }

    /* ----- HEADER (TITLE + NAV) WITH BACKGROUND IMAGE ----- */

      position: relative;
      /*background: url("./figs/AABB_logo_long_v2.1.png") no-repeat center center;*/
      background: url("./figs/bra_bru.png") no-repeat center center;
	  background-size: cover;
      color: #fff;
      padding: 2rem 1rem;
      text-align: center;
      overflow: hidden; /* So overlay doesn't overflow outside the header */
    }

    /* Optional overlay to darken/lighten the header background */
    header::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3); /* Adjust alpha for desired darkness */
      z-index: 1;
    }

    header h1,
    header nav {
      position: relative; /* So they're above the overlay */
      z-index: 2;
    }

    header h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      text-align: center;
    }

    nav ul {
      list-style-type: none;
      display: flex;
      justify-content: center;
      gap: 2rem;
    }

    nav a {
      text-decoration: none;
      color: #fff; /* White text for visibility on darker background */
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      transition: background-color 0.3s;
    }

    nav a:hover {
      background-color: rgba(255, 255, 255, 0.2);
    }

    nav a.active {
      background-color: rgba(255, 255, 255, 0.3);
    }

    /* ----- MAIN CONTENT: TABBED SECTIONS ----- */
    .tab-content {
      display: none; /* Hide all sections by default */
      padding: 2rem;
      max-width: 800px;
      margin: 2rem auto;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .active-content {
      display: block; /* Show active tab content */
    }

    /* ----- INDEX TAB: LOGOS IN ROWS ----- */
    .logo-row {
      display: flex;
      justify-content: center; 
      align-items: center;
      gap: 1rem;
      margin-top: 2rem;
    }

    .logo-placeholder {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ddd;
      border-radius: 4px;
      font-weight: bold;
      color: #555;
      text-align: center;
    }

    /* ----- MEMBERS TAB: CARD-STYLE RESEARCH GROUPS ----- */
    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .member-card {
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 1rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .member-card img {
      width: 100%;
      height: auto;
      border-radius: 4px;
      margin-bottom: 0.75rem;
    }

    .member-card h3 {
      margin: 0.75rem 0 0.5rem;
      font-size: 1.2rem;
    }

    .member-card p {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 1rem;
      line-height: 1.4;
    }

    .learn-more {
      display: inline-block;
      padding: 0.5rem 1rem;
      background-color: #0d6efd;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
    }

    .learn-more:hover {
      background-color: #094bcc;
    }
    
    .centered-text {
      text-align: center;
      font-size: 1.8rem;
      font-weight: bold;
      margin-top: 20px;
    }

    /* ----- EVENTS TAB: SCIENTIFIC & EDUCATIONAL EVENTS ----- */
.event-categories {
  display: flex;
  flex-direction: column; /* stack event categories vertically */
  gap: 2rem;
  margin-top: 1.5rem;
}

.event-category {
  flex: none;
  width: 100%;
}

.event-category h3 {
  margin-bottom: 1rem;
  font-size: 1.25rem;
  color: #333;
}

.event-list {
  display: flex;
  flex-direction: column; /* stack events vertically */
  gap: 1.5rem;
}

.event-item {
  display: flex;
  flex-direction: row;
  background-color: #fff;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
  overflow: hidden;
}

.event-date {
  background-color: #0d6efd;
  color: #fff;
  font-weight: bold;
  font-size: 0.9rem;
  text-align: center;

  /* Fixed size + center content */
  width: 150px;
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;

  /* Text wrap inside */
  white-space: normal;
  padding: 0.5rem;
}

.event-info {
  padding: 0.75rem 1rem;
  display: flex;
  flex-direction: column;
  justify-content: center;
  flex: 1;
}

.event-info h4 {
  margin: 0;
  font-size: 1.1rem;
  color: #333;
}

.event-info p {
  margin: 0.5rem 0 1rem;
  color: #555;
  line-height: 1.4;
}

.event-link {
  color: #0d6efd;
  font-weight: bold;
  text-decoration: none;
  align-self: flex-start;
}

.event-link:hover {
  text-decoration: underline;
}

    /* ----- PUBLICATIONS TAB: LIST OF PUBLICATIONS ----- */
    .publication-list {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .publication {

      border-radius: 8px;
      padding: 1rem 1.5rem;

      font-size: 1.1rem;
    }

    .publication-authors {
      font-style: italic;
      color: #666;
      margin: 0 0 0.25rem;
    }

    .publication-journal {
      color: #444;
      margin: 0 0 0.75rem;
    }

    .publication-link {
      display: inline-block;
      text-decoration: none;
      color: #0d6efd;
      font-weight: bold;
    }

    .publication-link:hover {
      text-decoration: underline;
    }
    hr {
      border: none;
      border-top: 1px solid #ccc;
      margin: 0.5rem 0;
    }



    /* ----- LANGUAGE SWITCHER ----- */
    .language-switcher {
      position: absolute;
      top: 0.75rem;
      right: 1rem;
      z-index: 3;
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0;
    }

    .language-switcher button {
      border: 1px solid rgba(255, 255, 255, 0.6);
      background-color: rgba(0, 0, 0, 0.25);
      color: #fff;
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: background-color 0.3s, border-color 0.3s;
    }

    .language-switcher button:hover,
    .language-switcher button.active-language {
      background-color: rgba(255, 255, 255, 0.28);
      border-color: #fff;
    }

    @media (max-width: 900px) {
      header {
        padding-top: 4rem;
      }

      .language-switcher {
        top: 0.75rem;
        right: 0.75rem;
      }
    }
      
    /* ----- RESPONSIVE DESIGN ----- */
    @media (max-width: 600px) {
      nav ul {

        gap: 0.5rem;
      }

        text-align: center;
        width: 100%;
      }

      .event-categories {
        flex-direction: column;
      }
    }

  <!-- JAVASCRIPT FOR TABBED INTERFACE -->
  <script>
    function openTab(event, tabId) {
      // 1. Hide all tab-content sections
      const tabContents = document.getElementsByClassName('tab-content');
      for (let i = 0; i < tabContents.length; i++) {
        tabContents[i].style.display = 'none';
        tabContents[i].classList.remove('active-content');
      }

      // 2. Remove "active" class from all navigation links
      const tabLinks = document.querySelectorAll('nav a');
      tabLinks.forEach(link => link.classList.remove('active'));

      // 3. Show the clicked tab's content
      const activeSection = document.getElementById(tabId);
      activeSection.style.display = 'block';
      activeSection.classList.add('active-content');

      // 4. Add "active" class to the clicked tab link
      event.currentTarget.classList.add('active');
    }
  </script>

    function setLanguage(lang) {
      const selectedLanguage = translations[lang] ? lang : 'pt';
      const dictionary = translations[selectedLanguage];

      document.documentElement.lang = dictionary.htmlLang;
      document.title = dictionary.pageTitle;

      const metaDescription = document.querySelector('meta[name="description"]');
      if (metaDescription) {
        metaDescription.setAttribute('content', dictionary.metaDescription);
      }

      renderContent(dictionary);

      document.querySelectorAll('[data-lang-button]').forEach(button => {
        button.classList.toggle('active-language', button.getAttribute('data-lang-button') === selectedLanguage);
      });

      localStorage.setItem('aabbav-language', selectedLanguage);
    }

    function getInitialLanguage() {
      const savedLanguage = localStorage.getItem('aabbav-language');
      if (translations[savedLanguage]) {
        return savedLanguage;
      }

      const browserLanguage = (navigator.language || navigator.userLanguage || '').toLowerCase();
      if (browserLanguage.startsWith('pt')) return 'pt';
      if (browserLanguage.startsWith('nl')) return 'nl';
      if (browserLanguage.startsWith('fr')) return 'fr';
      if (browserLanguage.startsWith('en')) return 'en';
      return 'pt';
    }

    document.addEventListener('DOMContentLoaded', () => {
      setLanguage(getInitialLanguage());
    });
  </script>
